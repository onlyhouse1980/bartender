<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08000F" />
    <title>BarStart DE ist offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(204, 0, 85, 0.28), transparent 38%),
          linear-gradient(180deg, #12001e 0%, #08000f 100%);
        color: #f5f0ff;
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 28px 24px;
        border: 1px solid rgba(245, 240, 255, 0.14);
        border-radius: 24px;
        background: rgba(8, 0, 15, 0.82);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(245, 240, 255, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>
        BarStart DE braucht kurz wieder eine Verbindung. Bereits geladene Inhalte
        bleiben verfuegbar, sobald du die App erneut oeffnest.
      </p>
    </main>
  </body>
</html>
